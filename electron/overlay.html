<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; background: transparent; overflow: hidden; }

    canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }

    #end-call-btn {
      position: fixed; bottom: 24px; right: 24px;
      padding: 10px 22px; background: #c0392b; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
      cursor: pointer; pointer-events: all; z-index: 9999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s ease;
    }
    #end-call-btn.visible { opacity: 1; }

    #help-indicator {
      position: fixed; bottom: 24px; left: 24px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(100, 108, 255, 0.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; pointer-events: all; z-index: 9999;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #help-indicator.visible { opacity: 1; transform: scale(1); animation: helpPulse 2s infinite; }

    @keyframes helpPulse {
      0%   { box-shadow: 0 0 0 0    rgba(100, 108, 255, 0.7); }
      70%  { box-shadow: 0 0 0 16px rgba(100, 108, 255, 0);   }
      100% { box-shadow: 0 0 0 0    rgba(100, 108, 255, 0);   }
    }

    #voice-panel {
      position: fixed; bottom: 90px; left: 24px; width: 320px;
      background: rgba(20, 20, 30, 0.95); border-radius: 12px; padding: 16px;
      z-index: 9999; pointer-events: all;
      display: none; flex-direction: column; gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    #voice-panel.visible { display: flex; }

    #panel-label { color: rgba(255,255,255,0.6); font-size: 12px; font-family: sans-serif; text-align: center; }

    #mic-btn {
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: #646cff; color: white; font-size: 24px;
      cursor: pointer; align-self: center; transition: background 0.2s;
    }
    #mic-btn.recording { background: #c0392b; animation: helpPulse 1s infinite; }

    #transcript-input {
      background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px;
      color: #fff; font-size: 13px; min-height: 72px; resize: none;
      font-family: sans-serif; border: 1px solid rgba(255,255,255,0.15);
      outline: none; width: 100%;
    }
    #transcript-input::placeholder { color: rgba(255,255,255,0.35); }

    #send-btn {
      padding: 8px 16px; background: #2ecc71; color: #fff;
      border: none; border-radius: 8px; font-size: 14px;
      font-weight: bold; cursor: pointer; display: none;
    }
    #send-btn.visible { display: block; }

    #cancel-voice-btn {
      padding: 6px 12px; background: transparent; color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      font-size: 12px; cursor: pointer;
    }

    /* Marco button fallback when SpeechRecognition not available */
    #marco-btn {
      position: fixed; bottom: 90px; right: 24px;
      padding: 10px 18px; background: rgba(100,108,255,0.9); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: bold;
      cursor: pointer; pointer-events: all; z-index: 9999;
      display: none;
    }
    #marco-btn.visible { display: block; }
  </style>
</head>
<body>
  <canvas id="overlay-canvas"></canvas>
  <button id="end-call-btn">End Call</button>
  <div id="help-indicator" title="Having trouble?">❓</div>
  <button id="marco-btn">🗣 Marco</button>

  <div id="voice-panel">
    <p id="panel-label">Describe your problem</p>
    <button id="mic-btn">🎤</button>
    <textarea id="transcript-input" placeholder="Tap mic to record, or type here..."></textarea>
    <button id="send-btn">Send to Expert</button>
    <button id="cancel-voice-btn">Cancel</button>
  </div>

  <script>
    const canvas     = document.getElementById('overlay-canvas');
    const ctx        = canvas.getContext('2d');
    const endBtn     = document.getElementById('end-call-btn');
    const helpBtn    = document.getElementById('help-indicator');
    const voicePanel = document.getElementById('voice-panel');
    const micBtn     = document.getElementById('mic-btn');
    const input      = document.getElementById('transcript-input');
    const sendBtn    = document.getElementById('send-btn');
    const cancelBtn  = document.getElementById('cancel-voice-btn');
    const marcoBtn   = document.getElementById('marco-btn');

    // ── Canvas resize ──────────────────────────────────────────────────────────
    function resizeCanvas(w, h) {
      canvas.width  = w || window.innerWidth;
      canvas.height = h || window.innerHeight;
    }
    resizeCanvas();
    window.electron.onBounds(({ width, height }) => resizeCanvas(width, height));

    // ── State ──────────────────────────────────────────────────────────────────
    let noviceX = 0.5, noviceY = 0.5; // updated by main process cursor poll
    let helpVisible = false;           // true when stuck detector says stuck

    // Marco Polo notes — hidden until novice cursor hovers
    // { x, y, text }  — x/y are normalised 0–1
    const marcoPoloNotes = [];

    const rings = []; // sonar rings: { x, y, radius, alpha }

    // ── Lazy animation loop ────────────────────────────────────────────────────
    // Only runs when there's something to draw (rings or visible notes).
    // Keeping the rAF idle when nothing is happening is what prevents mouse lag.
    let rafId = null;
    function scheduleAnimate() {
      if (!rafId) rafId = requestAnimationFrame(animateFrame);
    }

    function wrapText(context, text, maxWidth) {
      const words = text.split(' ');
      const lines = [];
      let current = '';
      for (const word of words) {
        const test = current ? current + ' ' + word : word;
        if (context.measureText(test).width > maxWidth && current) {
          lines.push(current); current = word;
        } else { current = test; }
      }
      if (current) lines.push(current);
      return lines;
    }

    function animateFrame() {
      rafId = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw any Marco Polo note that the novice is hovering over
      let needsMoreFrames = false;
      for (const note of marcoPoloNotes) {
        const dist = Math.hypot(note.x - noviceX, note.y - noviceY);
        note.visible = dist < 0.07; // show within ~7% of screen width
        if (note.visible) {
          const px = note.x * canvas.width;
          const py = note.y * canvas.height;
          const padding  = 8;
          const maxWidth = 180;
          ctx.font = '12px sans-serif';
          const lines = wrapText(ctx, note.text, maxWidth);
          const boxH  = lines.length * 16 + padding * 2;

          // Pin dot (always drawn even without hover, tiny so it's subtle)
          ctx.beginPath();
          ctx.arc(px, py, 5, 0, 2 * Math.PI);
          ctx.fillStyle = '#e67e22';
          ctx.fill();

          // Note box
          ctx.fillStyle = 'rgba(255, 235, 150, 0.95)';
          ctx.beginPath();
          ctx.roundRect(px + 10, py - 10, maxWidth + padding * 2, boxH, 6);
          ctx.fill();

          ctx.fillStyle = '#333';
          lines.forEach((line, i) => ctx.fillText(line, px + 10 + padding, py - 10 + padding + 14 + i * 16));
          needsMoreFrames = true;
        }
      }

      // Draw sonar rings
      for (let i = rings.length - 1; i >= 0; i--) {
        const r = rings[i];
        r.radius += 1.5;
        r.alpha  -= 0.012;
        if (r.alpha <= 0) { rings.splice(i, 1); continue; }
        needsMoreFrames = true;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, 2 * Math.PI);
        ctx.strokeStyle = `rgba(100, 108, 255, ${r.alpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (needsMoreFrames) scheduleAnimate();
    }

    function spawnRings(px, py) {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => { rings.push({ x: px, y: py, radius: 0, alpha: 0.8 }); scheduleAnimate(); }, i * 200);
      }
    }

    // ── Zone-change from main process (replaces { forward:true } entirely) ─────
    // Main polls OS cursor position every 50ms and tells us:
    //   inEndZone  — cursor near End Call button (bottom-right)
    //   inHelpZone — cursor near Help indicator + voice panel (bottom-left)
    //   normX/Y    — cursor normalised position for note proximity
    window.electron.onZoneChange(({ inEndZone, inHelpZone, normX, normY }) => {
      noviceX = normX;
      noviceY = normY;

      // Show End Call button only when cursor is in its zone
      endBtn.classList.toggle('visible', inEndZone);

      // Show Help indicator only when stuck AND cursor is in help zone
      helpBtn.classList.toggle('visible', helpVisible && inHelpZone);

      // Show Marco fallback button only when notes are waiting and cursor is in end zone area
      marcoBtn.classList.toggle('visible', marcoPoloNotes.length > 0 && !hasNativeSpeech);

      // Redraw canvas if any notes exist (to update hover state)
      if (marcoPoloNotes.length > 0) scheduleAnimate();
    });

    // ── Stuck signal ───────────────────────────────────────────────────────────
    window.electron.onStuck((stuck) => {
      helpVisible = stuck;
      // Actual visibility depends on zone — zone-change will update the class
    });

    // ── End Call ───────────────────────────────────────────────────────────────
    endBtn.addEventListener('click', () => window.electron.exitOverlayMode());

    // ── Help indicator → voice panel ───────────────────────────────────────────
    helpBtn.addEventListener('click', () => {
      voicePanel.classList.add('visible');
      window.electron.setPanelOpen(true);
      window.electron.setFocusable(true);
      window.electron.focusOverlay();
      input.focus();
    });

    function closePanel() {
      voicePanel.classList.remove('visible');
      window.electron.setPanelOpen(false);
      window.electron.setFocusable(false);
    }

    input.addEventListener('input', () => {
      const placeholder = input.value === 'Recording...' || input.value === 'Transcribing...';
      sendBtn.classList.toggle('visible', !placeholder && input.value.trim().length > 0);
    });

    // ── Mic button ─────────────────────────────────────────────────────────────
    let isRecording = false;

    micBtn.addEventListener('click', () => {
      isRecording = !isRecording;
      micBtn.classList.toggle('recording', isRecording);
      micBtn.textContent = isRecording ? '⏹' : '🎤';
      if (isRecording) input.value = 'Listening...';
      window.electron.startRecording();
    });

    window.electron.onTranscript((raw) => {
      let msg;
      try { msg = JSON.parse(raw); } catch { return; }

      if (msg.type === 'interim') {
        input.value = msg.text;
        const placeholder = msg.text === 'Recording...' || msg.text === 'Transcribing...';
        sendBtn.classList.toggle('visible', !placeholder && msg.text.trim().length > 0);

      } else if (msg.type === 'final') {
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎤';
        if (msg.text) { input.value = msg.text; sendBtn.classList.add('visible'); }
        // Make overlay focusable so novice can edit the transcription
        window.electron.setFocusable(true);
        window.electron.focusOverlay();
        input.focus();

      } else if (msg.type === 'error') {
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎤';
        if (input.value === 'Recording...') input.value = '';
        input.placeholder = msg.text || 'Voice unavailable — type your problem here';
        window.electron.setFocusable(true);
        window.electron.focusOverlay();
        input.focus();
      }
    });

    sendBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      window.electron.sendHelpRequest(text);
      helpVisible = false;
      input.value = '';
      sendBtn.classList.remove('visible');
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      closePanel();
    });

    cancelBtn.addEventListener('click', () => {
      if (isRecording) { isRecording = false; window.electron.startRecording(); }
      input.value = '';
      sendBtn.classList.remove('visible');
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      closePanel();
    });

    // ── Marco Polo ─────────────────────────────────────────────────────────────
    // When the expert drops a sticky note, it goes into marcoPoloNotes[].
    // The note is invisible until the novice hovers their cursor over it.
    // The novice says "Marco" → system plays a spatial "Polo" tone from the note's
    // position. Haptics fire when close. Sonar rings appear when very close.

    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    // Play a short spatial "Polo" beep from a normalised screen position
    function playPolo(normX, normY) {
      const ac = getAudioCtx();
      const panner = ac.createPanner();
      panner.panningModel  = 'HRTF';
      panner.distanceModel = 'inverse';
      panner.refDistance   = 1;
      panner.maxDistance   = 10;
      panner.rolloffFactor = 2;
      panner.positionX.value = (normX - 0.5) * 10;
      panner.positionY.value = -(normY - 0.5) * 10;
      panner.positionZ.value = -1;

      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.6, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);

      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);       // C5
      osc.frequency.exponentialRampToValueAtTime(330, ac.currentTime + 0.4); // E4
      osc.connect(panner);
      panner.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.7);
    }

    // Called whenever "Marco" is detected (speech or button)
    function onMarco() {
      if (marcoPoloNotes.length === 0) return;
      const note = marcoPoloNotes[0]; // respond to first active note

      // Spatial Polo tone from note's position
      playPolo(note.x, note.y);

      const dist = Math.hypot(note.x - noviceX, note.y - noviceY);

      // Haptics — stronger the closer you are
      if (navigator.vibrate) {
        if (dist < 0.08)       navigator.vibrate([80, 40, 80]);  // very close
        else if (dist < 0.2)   navigator.vibrate(60);            // close
        else                   navigator.vibrate(30);            // far
      }

      // Sonar rings only when very close
      if (dist < 0.08) {
        spawnRings(note.x * canvas.width, note.y * canvas.height);
      }
    }

    // Try native SpeechRecognition; fall back to a button if unavailable
    let hasNativeSpeech = false;
    let recognition = null;

    function startMarcoListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return; // button fallback is shown via zone-change handler
      hasNativeSpeech = true;
      marcoBtn.classList.remove('visible'); // hide fallback button

      recognition = new SR();
      recognition.continuous    = true;
      recognition.interimResults = true;
      recognition.lang           = 'en-US';

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript.toLowerCase();
          if (t.includes('marco')) onMarco();
        }
      };

      recognition.onerror = (e) => {
        // If speech API errors, show the button fallback
        if (e.error !== 'no-speech') { hasNativeSpeech = false; }
      };

      // Auto-restart — recognition stops after ~60s of silence
      recognition.onend = () => {
        if (marcoPoloNotes.length > 0 && hasNativeSpeech) recognition.start();
      };

      recognition.start();
    }

    function stopMarcoListening() {
      if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
      marcoBtn.classList.remove('visible');
    }

    // Marco fallback button
    marcoBtn.addEventListener('click', onMarco);

    // ── Incoming cursor / note messages from expert ────────────────────────────
    window.electron.onCursor(({ type, x, y, text }) => {
      if (type === 'sticky-note') {
        // New Marco Polo note — don't draw it yet, start listening
        marcoPoloNotes.push({ x, y, text, visible: false });
        startMarcoListening();
        scheduleAnimate(); // kick off loop so hover detection works
        return;
      }
      // Regular cursor messages currently unused on novice side
      // (ghost cursor deliberately removed — kept as hook for future use)
    });

  </script>
</body>
</html>
