<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
    }
    #end-call-btn {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 10px 22px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: all;
      z-index: 9999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #end-call-btn.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="overlay-canvas"></canvas>
  <audio id="chime" src="chime.mp3"></audio>
  <button id="end-call-btn">End Call</button>

  <script>
    let target = null;
    let arrived = false;
    const canvas = document.getElementById('overlay-canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('end-call-btn');

    const chime = document.getElementById('chime');
    let ripples = [];

    let stickyNote = null;
    let playback = {
      events: [],
      startTime: null,
      playing: false
    };

    target = { x: 0.6, y: 0.4 };  // center-right-ish
stickyNote = {
  x: 0.65,
  y: 0.35,
  text: "Click this!"
};

// fake recorded cursor path to test playback
startPlayBack([
  { x: 0.1, y: 0.7, t: 0 },
  { x: 0.25, y: 0.6, t: 200 },
  { x: 0.4, y: 0.5, t: 400 },
  { x: 0.55, y: 0.45, t: 600 },
  { x: 0.65, y: 0.35, t: 800 }
]);

  

    // Canvas starts at window size, updates if window moves/resizes
    function resizeCanvas(w, h) {
      canvas.width  = w || window.innerWidth;
      canvas.height = h || window.innerHeight;
    }
    resizeCanvas();

    // Receive updated window bounds when tracked window moves
    window.electron.onBounds(({ width, height }) => resizeCanvas(width, height));

    // Draw ghost cursor at normalised coords
    let cursor = { x: 0, y: 0 }; 
    function drawCursor() {
      const x = cursor.x * canvas.width;
      const y = cursor.y * canvas.height;

      ctx.beginPath();
      ctx.arc(x, y, 14, 0, 2 * Math.PI);
      ctx.strokeStyle = `rgba(255, 80, 80, 0.95)`;
      ctx.lineWidth = 2.5; 
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x-9, y);
      ctx.lineTo(x+9, y);
      ctx.moveTo(x, y-9);
      ctx.lineTo(x, y+9);
      ctx.strokeStyle = `rgba(255, 80, 80, 0.95)`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    function createRipple(x,y){
      ripples.push({
        x,y,radius:10, alpha: 1
      });

      chime.currentTime = 0;
      chime.play().catch(()=>{});
    }
    function drawRipples(){
      for (let i = ripples.length -1; i >= 0; i --) {
        const r = ripples[i];

        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(120, 200, 255, ${r.alpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        r.radius += 4;
        r.alpha -= 0.025;

        if (r.alpha <= 0) {
          ripples.splice(i, 1);
        }
      }
    }
    function startPlayBack(events){
        playback.events = events;
        playback.startTime = performance.now();
        playback.playing = true;
    }
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawRipples();
      drawCursor();
      drawStickyNote();
      requestAnimationFrame(render);

      if (playback.playing) {
        const elapsed = performance.now() - playback.startTime;

  // find the last event where timestamp <= elapsed
        let event = playback.events[playback.events.length - 1];
        for (let i = 0; i < playback.events.length; i++) {
          if (playback.events[i].t >= elapsed) {
            event = playback.events[i];
            break;
          }
        }
        cursor.x = event.x;
        cursor.y = event.y;

        if(target && !arrived){
          const dx = cursor.x - target.x;
          const dy = cursor.y - target.y;
          const dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 0.05){
          arrived = true;
          createRipple(target.x*canvas.width, target.y*canvas.height);
        }
      }

  // stop playback when finished
        if (elapsed > playback.events[playback.events.length - 1].t) {
          playback.playing = false;
        }
      }
    }
    render();


    window.electron.onCursor(({ x, y }) => {
      cursor.x = x;
      cursor.y = y;

      if(target && !arrived){
        const dx = x-target.x;
        const dy = y-target.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 0.05){
          arrived = true;
          createRipple(target.x*canvas.width, target.y*canvas.height);
      }
    }
  });

  function drawStickyNote() {
    if (!stickyNote) return;

    const x = stickyNote.x * canvas.width;
    const y = stickyNote.y * canvas.height;

    const w = 180;
    const h = 100;

    ctx.fillStyle = "#fff7a8";
    ctx.fillRect(x,y, w, h);

    ctx.strokeStyle = "#e2d96f";
    ctx.strokeRect(x,y, w, h);

    ctx.fillStyle = "#333";
    ctx.font = "16px sans-serif";
    ctx.fillText(stickyNote.text, x + 10, y + 25);
  };

    // Hover zone: bottom-right 180x90px area
    // Use JS tracking so button stays visible when mouse moves onto it
    let inZone = false;
    let inBtn  = false;

    function updateVisibility() {
      if (inZone || inBtn) {
        btn.classList.add('visible');
        window.electron.setIgnoreMouse(false);
      } else {
        btn.classList.remove('visible');
        window.electron.setIgnoreMouse(true);
      }
    }

    // Detect mouse near bottom-right corner via mousemove on the document
    // (only fires when setIgnoreMouseEvents is false, so we poll instead)
    function checkCorner(e) {
      const margin = 180;
      const marginY = 90;
      const nearCorner =
        e.clientX > window.innerWidth  - margin &&
        e.clientY > window.innerHeight - marginY;
      if (nearCorner !== inZone) {
        inZone = nearCorner;
        updateVisibility();
      }
    }

    // Poll mouse position via a transparent tracking div
    const tracker = document.createElement('div');
    Object.assign(tracker.style, {
      position: 'fixed', bottom: '0', right: '0',
      width: '180px', height: '90px',
      pointerEvents: 'all', zIndex: '9998',
    });
    tracker.addEventListener('mouseenter', () => { inZone = true;  updateVisibility(); });
    tracker.addEventListener('mouseleave', () => { inZone = false; updateVisibility(); });
    document.body.appendChild(tracker);

    btn.addEventListener('mouseenter', () => { inBtn = true;  updateVisibility(); });
    btn.addEventListener('mouseleave', () => { inBtn = false; updateVisibility(); });

    btn.addEventListener('click', () => {
      window.electron.exitOverlayMode();
    });
    window.addEventListener("mousemove", (e) => {
  const x = e.clientX / window.innerWidth;
  const y = e.clientY / window.innerHeight;

  window.electron.sendCursor({ x, y });
  });
  
  </script>
</body>
</html>
