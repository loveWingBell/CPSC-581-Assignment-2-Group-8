<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; background: transparent; overflow: hidden; font-family: sans-serif; }

    canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }

    /* End Call button */
    #end-call-btn {
      position: fixed; bottom: 24px; right: 24px;
      padding: 10px 22px; background: #c0392b; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
      cursor: pointer; pointer-events: all; z-index: 9999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.2s ease;
    }
    #end-call-btn.visible { opacity: 1; }

    /*  Help/"Having Trouble?" button */
    #help-indicator {
      position: fixed; bottom: 24px; left: 24px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(100, 108, 255, 0.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; pointer-events: all; z-index: 9999;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #help-indicator.visible { opacity: 1; transform: scale(1); animation: pulse 2s infinite; }

    /* Cooldown SVG ring around help button  */
    #cooldown-ring {
      position: fixed; bottom: 18px; left: 18px;
      width: 60px; height: 60px; border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: rotate(-90deg);
      opacity: 0; transition: opacity 0.3s;
    }
    #cooldown-ring.visible { opacity: 1; }
    #cooldown-ring circle {
      fill: none; stroke: rgba(100,108,255,0.4); stroke-width: 3;
      stroke-dasharray: 163; stroke-dashoffset: 163;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0    rgba(100,108,255,0.7); }
      70%  { box-shadow: 0 0 0 16px rgba(100,108,255,0);   }
      100% { box-shadow: 0 0 0 0    rgba(100,108,255,0);   }
    }

    /* Voice panel (help request) */
    #voice-panel {
      position: fixed; bottom: 90px; left: 24px; width: 320px;
      background: rgba(20,20,30,0.95); border-radius: 12px; padding: 16px;
      z-index: 9999; pointer-events: all;
      display: none; flex-direction: column; gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    #voice-panel.visible { display: flex; }
    #panel-label { color: rgba(255,255,255,0.6); font-size: 12px; text-align: center; }
    #mic-btn {
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: #646cff; color: white; font-size: 24px;
      cursor: pointer; align-self: center; transition: background 0.2s;
    }
    #mic-btn.recording { background: #c0392b; animation: pulse 1s infinite; }
    #transcript-input {
      background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px;
      color: #fff; font-size: 13px; min-height: 72px; resize: none;
      border: 1px solid rgba(255,255,255,0.15); outline: none; width: 100%;
    }
    #transcript-input::placeholder { color: rgba(255,255,255,0.35); }
    #send-btn {
      padding: 8px 16px; background: #2ecc71; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: bold;
      cursor: pointer; display: none;
    }
    #send-btn.visible { display: block; }
    #cancel-voice-btn {
      padding: 6px 12px; background: transparent; color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      font-size: 12px; cursor: pointer;
    }

    /*  Stamp panel */
    #stamp-panel {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(15,20,35,0.97); border-radius: 16px; padding: 28px 36px;
      z-index: 9999; pointer-events: all; display: none; flex-direction: column;
      gap: 16px; align-items: center; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8); border: 1px solid rgba(100,108,255,0.3);
      min-width: 320px;
    }
    #stamp-panel.visible { display: flex; }
    #stamp-panel h3 { color: #fff; font-size: 18px; margin: 0; }
    #stamp-panel p  { color: rgba(255,255,255,0.55); font-size: 13px; margin: 0; }
    .stamp-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .stamp-btn {
      padding: 10px 20px; border: none; border-radius: 10px; font-size: 15px;
      font-weight: bold; cursor: pointer; transition: opacity 0.15s;
    }
    .stamp-btn:hover { opacity: 0.85; }

    /* Floating note caption — no bar, just text over the viewport */
    #note-caption-float {
      position: fixed;
      pointer-events: none; z-index: 9997;
      max-width: 320px;
      display: none;
    }
    .caption-source {
      color: rgba(100,108,255,0.95); font-size: 11px; margin-bottom: 3px;
      text-shadow: 0 0 8px rgba(0,0,0,1), 1px 1px 0 #000, -1px -1px 0 #000;
      text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700;
    }
    .caption-text {
      color: #fff; font-size: 14px; line-height: 1.5; font-weight: 500;
      text-shadow:
        0 0 10px rgba(0,0,0,1),
        1px  1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
        1px -1px 0 rgba(0,0,0,0.9),
        -1px -1px 0 rgba(0,0,0,0.9);
    }

    /* Floating note controls — compact, no bar */
    #note-controls-float {
      position: fixed;
      pointer-events: all; z-index: 9998;
      display: none; align-items: center; gap: 7px;
      margin-top: 6px;
    }
    .np-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: rgba(18,18,28,0.82); color: #fff; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }
    .np-btn:hover { background: rgba(60,60,90,0.95); }
    .np-btn.primary {
      background: rgba(100,108,255,0.88); width: 38px; height: 38px; font-size: 16px;
    }
    .np-btn.primary:hover { background: rgba(124,130,255,0.95); }
    .np-btn.dismiss {
      background: rgba(50,18,18,0.82); font-size: 12px; width: 26px; height: 26px;
      color: rgba(255,255,255,0.6);
    }
    .np-btn.dismiss:hover { background: rgba(192,57,43,0.88); color: #fff; }
    #note-progress-wrap {
      width: 72px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.15); overflow: hidden;
    }
    #note-progress-fill {
      height: 100%; background: #646cff; width: 0%;
      transition: width 0.25s linear;
    }

    /* Past notes history */
    #history-toggle {
      position: fixed; top: 14px; right: 14px;
      background: rgba(18,20,32,0.82); color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 5px 11px; font-size: 12px; cursor: pointer; pointer-events: all;
      z-index: 9999; display: none; backdrop-filter: blur(4px);
      transition: color 0.15s;
    }
    #history-toggle:hover { color: #fff; }
    #history-toggle.visible { display: block; }

    #history-panel {
      position: fixed; top: 46px; right: 14px; width: 272px; max-height: 340px;
      background: rgba(10,12,22,0.97); border-radius: 12px; padding: 12px;
      z-index: 9999; pointer-events: all; display: none; flex-direction: column;
      gap: 7px; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.75);
      border: 1px solid rgba(100,108,255,0.18);
    }
    #history-panel.visible { display: flex; }
    #history-panel h4 {
      color: rgba(255,255,255,0.4); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .history-item {
      background: rgba(255,255,255,0.04); border-radius: 8px; padding: 9px 10px;
      border: 1px solid rgba(255,255,255,0.05); transition: background 0.15s;
    }
    .history-item.has-audio { cursor: pointer; }
    .history-item.has-audio:hover { background: rgba(100,108,255,0.12); }
    .hi-text { color: #ccc; font-size: 12px; line-height: 1.4; }
    .hi-meta { color: rgba(255,255,255,0.28); font-size: 10px; margin-top: 3px; }
    .history-empty { color: rgba(255,255,255,0.28); font-size: 12px; text-align: center; padding: 10px 0; }

    /* Marco hint toast*/
    #marco-toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-12px);
      background: rgba(100,108,255,0.92); color: #fff;
      padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      pointer-events: none; z-index: 9999;
      opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.5);
    }
    #marco-toast.visible {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <canvas id="overlay-canvas"></canvas>

  <button id="end-call-btn">End Call</button>
  <div id="help-indicator" title="Having trouble?">❓</div>

  <!-- Cooldown progress ring (SVG) -->
  <svg id="cooldown-ring" viewBox="0 0 60 60">
    <circle id="cooldown-circle" cx="30" cy="30" r="26" />
  </svg>

  <!-- Voice request panel -->
  <div id="voice-panel">
    <p id="panel-label">Describe your problem</p>
    <button id="mic-btn">🎤</button>
    <textarea id="transcript-input" placeholder="Tap mic to record, or type here..."></textarea>
    <button id="send-btn">Send to Expert</button>
    <button id="cancel-voice-btn">Cancel</button>
  </div>

  <!-- Stamp panel (shown after note plays) -->
  <div id="stamp-panel">
    <h3>Did that help?</h3>
    <p>Let the expert know how it went</p>
    <div class="stamp-row">
      <button class="stamp-btn" id="stamp-worked"   style="background:#27ae60;color:#fff">✅ Worked!</button>
      <button class="stamp-btn" id="stamp-confused"  style="background:#e74c3c;color:#fff">😕 Still confused</button>
    </div>
    <button class="stamp-btn" id="stamp-rerecord" style="background:#444;color:#fff;font-size:13px;padding:8px 16px">🎤 Re-record my question</button>
    <button class="stamp-btn" id="stamp-skip" style="background:transparent;color:rgba(255,255,255,0.35);font-size:12px;padding:6px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:8px">Maybe later</button>
  </div>

  <!-- Floating note caption (no bar — just text above the note pin) -->
  <div id="note-caption-float">
    <div class="caption-source">📌 Expert Note</div>
    <div class="caption-text" id="note-caption-text">...</div>
  </div>

  <!-- Floating note controls -->
  <div id="note-controls-float">
    <button class="np-btn" id="np-rewind" title="Restart">⏮</button>
    <button class="np-btn primary" id="np-play" title="Play/Pause">▶</button>
    <button class="np-btn" id="np-stop" title="Stop">⏹</button>
    <div id="note-progress-wrap"><div id="note-progress-fill"></div></div>
    <button class="np-btn dismiss" id="np-dismiss" title="Dismiss note">✕</button>
  </div>

  <!-- Past notes history -->
  <button id="history-toggle">📋 Past Notes (<span id="history-count">0</span>)</button>
  <div id="history-panel">
    <h4>Past Notes</h4>
    <div id="history-list"><p class="history-empty">No dismissed notes yet</p></div>
  </div>

  <!-- Marco hint toast (shown when a note arrives) -->
  <div id="marco-toast">🎯 Say "Marco" to locate the note</div>

  <script>
    const canvas   = document.getElementById('overlay-canvas');
    const ctx      = canvas.getContext('2d');
    const endBtn   = document.getElementById('end-call-btn');
    const helpBtn  = document.getElementById('help-indicator');
    const cooldownRingEl  = document.getElementById('cooldown-ring');
    const cooldownCircle  = document.getElementById('cooldown-circle');
    const voicePanel      = document.getElementById('voice-panel');
    const micBtn          = document.getElementById('mic-btn');
    const input           = document.getElementById('transcript-input');
    const sendBtn         = document.getElementById('send-btn');
    const cancelBtn       = document.getElementById('cancel-voice-btn');
    const stampPanel      = document.getElementById('stamp-panel');
    const captionFloat    = document.getElementById('note-caption-float');
    const captionText     = document.getElementById('note-caption-text');
    const controlsFloat   = document.getElementById('note-controls-float');
    const npPlay          = document.getElementById('np-play');
    const npRewind        = document.getElementById('np-rewind');
    const npStop          = document.getElementById('np-stop');
    const npDismiss       = document.getElementById('np-dismiss');
    const npFill          = document.getElementById('note-progress-fill');
    const historyToggle   = document.getElementById('history-toggle');
    const historyPanel    = document.getElementById('history-panel');
    const historyList     = document.getElementById('history-list');
    const historyCount    = document.getElementById('history-count');
    const marcoToast      = document.getElementById('marco-toast');

    let marcoToastTimer = null;
    function showMarcoToast() {
      clearTimeout(marcoToastTimer);
      marcoToast.classList.add('visible');
      marcoToastTimer = setTimeout(() => marcoToast.classList.remove('visible'), 4000);
    }

    // Canvas resize 
      function resizeCanvas(w, h) {
      canvas.width  = w || window.innerWidth;
      canvas.height = h || window.innerHeight;
    }
    resizeCanvas();
    window.electron.onBounds(({ width, height }) => resizeCanvas(width, height));

    // State -----------------------------------------------------
    let noviceX = 0.5, noviceY = 0.5;
    let panelOpenLocal = false;
    let overNoteActive = false;
    let activeNoteIdx  = -1;
    let noteAudio      = null;
    let ttsSpeaking    = false;
    let ttsUtterance   = null;

    // marcoNotes: { x, y, text, audioSrc, revealed, dismissed }
    const marcoNotes   = [];
    const notesHistory = [];
    const rings        = [];

    // Help cooldown
    const HELP_COOLDOWN_MS = 90000; // 90 s
    let cooldownRafId  = null;
    let cooldownStart  = 0;
    let isStuckNow     = false;
    let helpVisible    = false;
    const CIRC = 2 * Math.PI * 26; // ~163.4

    function startCooldown() {
      helpVisible = false;
      helpBtn.classList.remove('visible');
      cooldownStart = Date.now();
      cooldownRingEl.classList.add('visible');

      function tick() {
        const pct = Math.min((Date.now() - cooldownStart) / HELP_COOLDOWN_MS, 1);
        // dashoffset goes from CIRC (empty) -> 0 (full drawn)
        cooldownCircle.style.strokeDashoffset = CIRC * (1 - pct);
        if (pct < 1) {
          cooldownRafId = requestAnimationFrame(tick);
        } else {
          cooldownRafId = null;
          cooldownRingEl.classList.remove('visible');
          cooldownCircle.style.strokeDashoffset = CIRC;
          if (isStuckNow) {
            helpVisible = true;
            helpBtn.classList.add('visible');
            openVoicePanel();  // auto-reopen after cooldown if still stuck
          }
        }
      }
      cooldownRafId = requestAnimationFrame(tick);
    }

    // onStuck fires every 500ms and oscillates (ML model is noisy).
    // Only act on the first true edge; never clear on false, startCooldown() resets.
    window.electron.onStuck((stuck) => {
      isStuckNow = stuck;
      if (stuck && !helpVisible && !cooldownRafId) {
        helpVisible = true;
        helpBtn.classList.add('visible');
        // Show button only — user clicks it to open panel
      }
    });

    // rAF draw loop \
    let rafId = null;
    function scheduleAnimate() { if (!rafId) rafId = requestAnimationFrame(animateFrame); }

    function wrapText(context, text, maxWidth) {
      const words = text.split(' '), lines = [];
      let cur = '';
      for (const w of words) {
        const t = cur ? cur + ' ' + w : w;
        if (context.measureText(t).width > maxWidth && cur) { lines.push(cur); cur = w; }
        else cur = t;
      }
      if (cur) lines.push(cur);
      return lines;
    }

    function animateFrame() {
      rafId = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let needsMore = false;

      for (let i = 0; i < marcoNotes.length; i++) {
        const note = marcoNotes[i];
        if (note.dismissed) continue;
        const dist = Math.hypot(note.x - noviceX, note.y - noviceY);
        if (dist < 0.025) note.revealed = true;

        const px = note.x * canvas.width;
        const py = note.y * canvas.height;

        if (!note.revealed) {
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, 2 * Math.PI);
          ctx.fillStyle = 'rgba(230,126,34,0.25)';
          ctx.fill();
          needsMore = true;
          continue;
        }

        const isActive = i === activeNoteIdx;
        const padding = 8, maxW = 180;
        ctx.font = '12px sans-serif';
        const lines = wrapText(ctx, note.text, maxW);
        const boxH  = lines.length * 16 + padding * 2 + (isActive ? 0 : 20);

        ctx.beginPath();
        ctx.arc(px, py, 6, 0, 2 * Math.PI);
        ctx.fillStyle = isActive ? '#646cff' : '#e67e22';
        ctx.fill();

        ctx.fillStyle = isActive ? 'rgba(100,108,255,0.95)' : 'rgba(255,235,150,0.97)';
        ctx.shadowColor = 'rgba(0,0,0,0.25)';
        ctx.shadowBlur  = 8;
        ctx.beginPath();
        ctx.roundRect(px + 10, py - 10, maxW + padding * 2, boxH, 8);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = isActive ? '#fff' : '#333';
        lines.forEach((line, li) =>
          ctx.fillText(line, px + 10 + padding, py - 10 + padding + 14 + li * 16));

        if (!isActive) {
          ctx.fillStyle = 'rgba(100,108,255,0.8)';
          ctx.font = '10px sans-serif';
          ctx.fillText('▶ tap to play', px + 10 + padding, py - 10 + boxH - 6);
        }
        needsMore = true;
      }

      // Sonar rings
      for (let i = rings.length - 1; i >= 0; i--) {
        const r = rings[i];
        r.radius += 1.5; r.alpha -= 0.012;
        if (r.alpha <= 0) { rings.splice(i, 1); continue; }
        needsMore = true;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, 2 * Math.PI);
        ctx.strokeStyle = `rgba(100,108,255,${r.alpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (needsMore) scheduleAnimate();
    }

    function spawnRings(px, py) {
      for (let i = 0; i < 4; i++) {
        setTimeout(() => { rings.push({ x: px, y: py, radius: 0, alpha: 0.9 }); scheduleAnimate(); }, i * 180);
      }
    }

    // Click-catcher (full-screen, only active over revealed notes)
    const clickCatcher = document.createElement('div');
    Object.assign(clickCatcher.style, {
      position: 'fixed', inset: '0', zIndex: '9990',
      pointerEvents: 'none', background: 'transparent',
    });
    document.body.appendChild(clickCatcher);

    // Zone-change listener
    window.electron.onZoneChange(({ inEndZone, inHelpZone, normX, normY }) => {
      noviceX = normX;
      noviceY = normY;

      endBtn.classList.toggle('visible', inEndZone);
      helpBtn.classList.toggle('visible', helpVisible);

      const overNote = marcoNotes.some(n =>
        !n.dismissed && n.revealed && Math.hypot(n.x - normX, n.y - normY) < 0.06);
      clickCatcher.style.pointerEvents = overNote ? 'all' : 'none';
      if (!panelOpenLocal) {
        if (overNote && !overNoteActive) {
          overNoteActive = true;
          window.electron.setPanelOpen(true);
        } else if (!overNote && overNoteActive) {
          overNoteActive = false;
          window.electron.setPanelOpen(false);
        } else if (!overNote && !inEndZone && !inHelpZone) {
          window.electron.setIgnoreMouse(true);
        }
      }

      if (activeNoteIdx >= 0) positionFloatingUI(activeNoteIdx);
      if (marcoNotes.length > 0) scheduleAnimate();
    });

    function positionFloatingUI(noteIdx) {
      const note = marcoNotes[noteIdx];
      if (!note || note.dismissed) return;
      const px = note.x * window.innerWidth;
      const py = note.y * window.innerHeight;
      const capX = Math.min(px + 14, window.innerWidth  - 340);
      const capY = Math.max(py - 96, 10);
      captionFloat.style.left  = capX + 'px';
      captionFloat.style.top   = capY + 'px';
      controlsFloat.style.left = capX + 'px';
      controlsFloat.style.top  = (capY + captionFloat.offsetHeight + 8) + 'px';
    }

    clickCatcher.addEventListener('click', (e) => {
      const nx = e.clientX / window.innerWidth;
      const ny = e.clientY / window.innerHeight;
      let closest = -1, closestDist = Infinity;
      for (let i = 0; i < marcoNotes.length; i++) {
        if (!marcoNotes[i].revealed || marcoNotes[i].dismissed) continue;
        const d = Math.hypot(marcoNotes[i].x - nx, marcoNotes[i].y - ny);
        if (d < 0.06 && d < closestDist) { closestDist = d; closest = i; }
      }
      if (closest !== -1) openNotePlayer(closest);
    });

    // End call 
    endBtn.addEventListener('click', () => window.electron.exitOverlayMode());

    // Voice panel helpers ----------------------------------------------
    helpBtn.addEventListener('click', () => openVoicePanel());

    function openVoicePanel() {
      stampPanel.classList.remove('visible');
      voicePanel.classList.add('visible');
      panelOpenLocal = true;
      window.electron.setIgnoreMouse(false);
      window.electron.setPanelOpen(true);
      window.electron.setFocusable(true);
      window.electron.focusOverlay();
      setTimeout(() => input.focus(), 80);
    }

    function closeVoicePanel() {
      voicePanel.classList.remove('visible');
      panelOpenLocal = false;
      window.electron.setPanelOpen(false);
      window.electron.setFocusable(false);
    }

    input.addEventListener('input', () => {
      const ph = input.value === 'Recording...' || input.value === 'Transcribing...';
      sendBtn.classList.toggle('visible', !ph && input.value.trim().length > 0);
    });

    let isRecording = false;
    micBtn.addEventListener('click', () => {
      isRecording = !isRecording;
      micBtn.classList.toggle('recording', isRecording);
      micBtn.textContent = isRecording ? '⏹' : '🎤';
      if (isRecording) input.value = 'Listening...';
      window.electron.startRecording();
    });

    window.electron.onTranscript((raw) => {
      let msg; try { msg = JSON.parse(raw); } catch { return; }
      if (msg.type === 'interim') {
        input.value = msg.text;
        const ph = msg.text === 'Recording...' || msg.text === 'Transcribing...';
        sendBtn.classList.toggle('visible', !ph && msg.text.trim().length > 0);
      } else if (msg.type === 'final') {
        isRecording = false;
        micBtn.classList.remove('recording'); micBtn.textContent = '🎤';
        if (msg.text) { input.value = msg.text; sendBtn.classList.add('visible'); }
        window.electron.setFocusable(true); window.electron.focusOverlay(); input.focus();
      } else if (msg.type === 'error') {
        isRecording = false;
        micBtn.classList.remove('recording'); micBtn.textContent = '🎤';
        if (input.value === 'Recording...') input.value = '';
        input.placeholder = msg.text || 'Voice unavailable — type here';
        window.electron.setFocusable(true); window.electron.focusOverlay(); input.focus();
      }
    });

    sendBtn.addEventListener('click', () => {
      const text = input.value.trim(); if (!text) return;
      window.electron.sendHelpRequest(text);
      input.value = ''; sendBtn.classList.remove('visible');
      isRecording = false; micBtn.classList.remove('recording'); micBtn.textContent = '🎤';
      closeVoicePanel();
      startCooldown();
    });

    cancelBtn.addEventListener('click', () => {
      if (isRecording) { isRecording = false; window.electron.startRecording(); }
      input.value = ''; sendBtn.classList.remove('visible');
      micBtn.classList.remove('recording'); micBtn.textContent = '🎤';
      closeVoicePanel();
    });

    // Stamp panel -------------------------------S
    function showStampPanel() {
      stampPanel.classList.add('visible');
      panelOpenLocal = true;
      window.electron.setIgnoreMouse(false);   // immediate — don't wait for panelOpen IPC
      window.electron.setPanelOpen(true);
      window.electron.setFocusable(true);
      window.electron.focusOverlay();
    }

    function closeStampPanel() {
      stampPanel.classList.remove('visible');
      panelOpenLocal = false;
      window.electron.setPanelOpen(false);
      window.electron.setFocusable(false);
    }

    document.getElementById('stamp-worked').addEventListener('click', () => {
      window.electron.sendStamp('worked'); closeStampPanel();
    });
    document.getElementById('stamp-confused').addEventListener('click', () => {
      window.electron.sendStamp('confused'); closeStampPanel();
    });
    document.getElementById('stamp-rerecord').addEventListener('click', () => {
      closeStampPanel(); openVoicePanel();
    });
    document.getElementById('stamp-skip').addEventListener('click', () => {
      closeStampPanel();
    });

    // Note player ---------------------------------------------
    function openNotePlayer(noteIdx) {
      if (noteIdx < 0 || noteIdx >= marcoNotes.length) return;
      activeNoteIdx = noteIdx;
      const note = marcoNotes[noteIdx];

      stopCurrentPlayback();
      captionText.textContent = note.text;
      npFill.style.width = '0%';
      npPlay.textContent = '▶';

      captionFloat.style.display  = 'block';
      controlsFloat.style.display = 'flex';
      positionFloatingUI(noteIdx);

      panelOpenLocal = true;
      window.electron.setIgnoreMouse(false);
      window.electron.setPanelOpen(true);
      scheduleAnimate();
      startNotePlayback(note);
    }

    function startNotePlayback(note) {
      stopCurrentPlayback();
      if (note.audioSrc) {
        noteAudio = new Audio(note.audioSrc);
        noteAudio.ontimeupdate = () => {
          if (noteAudio.duration)
            npFill.style.width = (noteAudio.currentTime / noteAudio.duration * 100) + '%';
        };
        noteAudio.onended = () => {
          npPlay.textContent = '▶';
          npFill.style.width = '100%';
          onPlaybackEnded();
        };
        noteAudio.play();
        npPlay.textContent = '⏸';
      } else {
        playTTS(note.text);
      }
    }

    // Trigger stamp panel after note finishes playing
    function onPlaybackEnded() {
      showStampPanel();
    }

    function stopCurrentPlayback() {
      if (noteAudio) { noteAudio.pause(); noteAudio.currentTime = 0; noteAudio = null; }
      if (ttsUtterance) {
        speechSynthesis.cancel(); ttsUtterance = null; ttsSpeaking = false;
        npFill.style.width = '0%'; npPlay.textContent = '▶';
      }
    }

    function playTTS(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      ttsUtterance = new SpeechSynthesisUtterance(text);
      ttsUtterance.rate = 0.95;
      ttsSpeaking = true;
      npPlay.textContent = '⏸';
      const charCount = text.length;
      ttsUtterance.onboundary = (e) => {
        if (e.charIndex != null)
          npFill.style.width = (e.charIndex / charCount * 100) + '%';
      };
      ttsUtterance.onend = () => {
        ttsSpeaking = false; ttsUtterance = null;
        npPlay.textContent = '▶'; npFill.style.width = '100%';
        onPlaybackEnded();
      };
      speechSynthesis.speak(ttsUtterance);
    }

    npPlay.addEventListener('click', () => {
      const note = marcoNotes[activeNoteIdx]; if (!note) return;
      if (note.audioSrc && noteAudio) {
        if (noteAudio.paused) { noteAudio.play(); npPlay.textContent = '⏸'; }
        else                  { noteAudio.pause(); npPlay.textContent = '▶'; }
      } else if (note.audioSrc && !noteAudio) {
        startNotePlayback(note);
      } else {
        if (ttsSpeaking) { speechSynthesis.pause(); ttsSpeaking = false; npPlay.textContent = '▶'; }
        else if (speechSynthesis.paused) { speechSynthesis.resume(); ttsSpeaking = true; npPlay.textContent = '⏸'; }
        else { playTTS(note.text); }
      }
    });

    npRewind.addEventListener('click', () => {
      const note = marcoNotes[activeNoteIdx]; if (!note) return;
      npFill.style.width = '0%';
      if (note.audioSrc && noteAudio) { noteAudio.currentTime = 0; noteAudio.play(); npPlay.textContent = '⏸'; }
      else { playTTS(note.text); }
    });

    npStop.addEventListener('click', () => {
      stopCurrentPlayback();
      npPlay.textContent = '▶'; npFill.style.width = '0%';
      captionFloat.style.display  = 'none';
      controlsFloat.style.display = 'none';
      stampPanel.classList.remove('visible'); // close feedback if open
      activeNoteIdx  = -1;
      overNoteActive = false;
      panelOpenLocal = false;
      window.electron.setPanelOpen(false);
      window.electron.setFocusable(false);
    });

    // Dismiss note
    npDismiss.addEventListener('click', () => {
      if (activeNoteIdx < 0 || !marcoNotes[activeNoteIdx]) return;
      stopCurrentPlayback();
      const note = marcoNotes[activeNoteIdx];
      const idx  = activeNoteIdx;
      note.dismissed = true;

      // Archive
      notesHistory.push({
        text:     note.text,
        hasAudio: !!note.audioSrc,
        audioSrc: note.audioSrc || null,
        time:     new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      });
      renderHistory();

      // Tell expert to remove it from their canvas
      window.electron.dismissNote(idx);

      captionFloat.style.display  = 'none';
      controlsFloat.style.display = 'none';
      activeNoteIdx  = -1;
      overNoteActive = false;
      panelOpenLocal = false;
      window.electron.setPanelOpen(false);
      window.electron.setFocusable(false);
      scheduleAnimate();
    });

    // History -----------------------------------------------
    function renderHistory() {
      historyCount.textContent = notesHistory.length;
      historyToggle.classList.toggle('visible', notesHistory.length > 0);
      if (!notesHistory.length) {
        historyList.innerHTML = '<p class="history-empty">No dismissed notes yet</p>';
        return;
      }
      historyList.innerHTML = '';
      [...notesHistory].reverse().forEach((n) => {
        const div = document.createElement('div');
        div.className = 'history-item' + (n.hasAudio ? ' has-audio' : '');
        div.innerHTML = `
          <div class="hi-text">${n.text}</div>
          <div class="hi-meta">${n.time}${n.hasAudio ? ' · 🔊 tap to replay' : ''}</div>
        `;
        if (n.audioSrc) {
          div.addEventListener('click', () => new Audio(n.audioSrc).play());
        }
        historyList.appendChild(div);
      });
    }

    historyToggle.addEventListener('click', () => {
      const open = historyPanel.classList.toggle('visible');
      panelOpenLocal = open;
      window.electron.setPanelOpen(open);
      if (open) { window.electron.setFocusable(true); window.electron.focusOverlay(); }
      else       { window.electron.setFocusable(false); }
    });

    // Audio context ------------------------------------
    let audioCtx = null;
    function getAudioCtx() { if (!audioCtx) audioCtx = new AudioContext(); return audioCtx; }

    // Polo sound — spoken "Polo" + quiet HRTF tick for directionality 
    async function playPolo(normX, normY, dist) {
      const ac = getAudioCtx();
      if (ac.state !== 'running') await ac.resume();

      // Short spatial tick — gives the HRTF engine something to work with
      const panner = ac.createPanner();
      panner.panningModel  = 'HRTF';
      panner.distanceModel = 'inverse';
      panner.refDistance   = 1;
      panner.maxDistance   = 10;
      panner.rolloffFactor = 2;
      panner.positionX.value = (normX - 0.5) * 10;
      panner.positionY.value = -(normY - 0.5) * 10;
      panner.positionZ.value = -1;

      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.7, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);

      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 880;
      osc.connect(panner); panner.connect(gain); gain.connect(ac.destination);
      osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.7);

      // Spoken "Polo," pitch climbs as cursor closes in (far=low, close=high)
      // (couldn't get the spatial audio to work with tts)
      if (window.speechSynthesis) {
        speechSynthesis.cancel();
        const utter    = new SpeechSynthesisUtterance('Polo');
        utter.rate     = 1.1;
        utter.pitch    = Math.max(0.5, 1.9 - dist * 5); // 0.5 far -> ~1.9 right on it
        utter.volume   = 1;
        speechSynthesis.speak(utter);
      }
    }

    // Marco handler ------------------------------
    function onMarco() {
      const active = marcoNotes.filter(n => !n.dismissed);
      if (!active.length) return;

      // Find nearest active note to cursor
      let nearest = active[0];
      let nearestDist = Math.hypot(nearest.x - noviceX, nearest.y - noviceY);
      for (const n of active) {
        const d = Math.hypot(n.x - noviceX, n.y - noviceY);
        if (d < nearestDist) { nearest = n; nearestDist = d; }
      }

      // Spatial Polo sound + voice
      playPolo(nearest.x, nearest.y, nearestDist);

      // Haptic, intensity scales with proximity
      if (navigator.vibrate) {
        if      (nearestDist < 0.06) navigator.vibrate([100, 40, 100, 40, 100]);
        else if (nearestDist < 0.12) navigator.vibrate([80, 40, 80]);
        else if (nearestDist < 0.25) navigator.vibrate(60);
        else                         navigator.vibrate(25);
      }

      // Sonar rings when cursor is right on the note (inside the reveal zone)
      if (nearestDist < 0.20) {
        spawnRings(nearest.x * canvas.width, nearest.y * canvas.height);
      }
    }

    window.electron.onMarcoDetected(() => {
      if (window.speechSynthesis) {
        speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance('Polo');
        utter.rate = 1.1; utter.pitch = 1.0; utter.volume = 1;
        speechSynthesis.speak(utter);
      }
      onMarco();
    });

    // Incoming sticky-note from expert
    window.electron.onCursor(({ type, x, y, text, audioSrc }) => {
      if (type === 'sticky-note') {
        marcoNotes.push({ x, y, text, audioSrc: audioSrc || null, revealed: false, dismissed: false });
        scheduleAnimate();
        showMarcoToast(); // tell novice to start saying "Marco"
      }
    });

  </script>
</body>
</html>
